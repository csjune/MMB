name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-windows:
    name: Release Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --release --locked -- -D warnings

      - name: Run tests
        run: cargo test --release --locked

      - name: Build release
        run: cargo build --release --locked

      - name: Package Windows binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item -Path target\release\mmb.exe -Destination dist\mmb.exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: mmb.exe
          path: dist/mmb.exe

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag }}" } else { "${{ github.ref_name }}" }
          if (gh release view $tag --repo "${{ github.repository }}" *> $null) {
            gh release upload $tag dist/mmb.exe --repo "${{ github.repository }}" --clobber
          } else {
            gh release create $tag dist/mmb.exe --repo "${{ github.repository }}" --title "MMB $tag" --generate-notes --verify-tag
          }
