name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-windows:
    name: Release Windows
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Verify release version
        shell: pwsh
        run: |
          if ($env:RELEASE_TAG -cnotmatch '^v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$') {
            throw "Invalid release tag: $env:RELEASE_TAG"
          }

          $metadata = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
          $package = $metadata.packages | Where-Object { $_.name -eq "mmb" } | Select-Object -First 1
          if ($null -eq $package) {
            throw "MMB package was not found in cargo metadata"
          }

          $expectedTag = "v$($package.version)"
          if ($env:RELEASE_TAG -cne $expectedTag) {
            throw "Release tag $env:RELEASE_TAG does not match Cargo package version $expectedTag"
          }

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --release --locked -- -D warnings

      - name: Run tests
        run: cargo test --workspace --release --locked

      - name: Build release
        run: cargo build --release --locked -p mmb

      - name: Package Windows binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item -Path target\release\mmb.exe -Destination dist\mmb.exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: mmb.exe
          path: dist/mmb.exe

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          if (gh release view $env:RELEASE_TAG --repo "${{ github.repository }}" *> $null) {
            gh release upload $env:RELEASE_TAG dist/mmb.exe --repo "${{ github.repository }}" --clobber
          } else {
            gh release create $env:RELEASE_TAG dist/mmb.exe --repo "${{ github.repository }}" --title "MMB $env:RELEASE_TAG" --generate-notes --verify-tag
          }
